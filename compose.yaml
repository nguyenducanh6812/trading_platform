services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=trading_platform'
      - 'POSTGRES_USER=trading_user'
      - 'POSTGRES_PASSWORD=trading_password'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount init script - automatically executed on first container startup
      - ./deployment/database/init-database.sql:/docker-entrypoint-initdb.d/01-init-schema.sql:ro

volumes:
  postgres_data:
