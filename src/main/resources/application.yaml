# Spring Boot Configuration
spring:
  application:
    name: trading-platform
  
  # Primary Database Configuration (Trading Platform - Business Data)
  datasource:
    url: jdbc:postgresql://localhost:5432/trading_platform
    driver-class-name: org.postgresql.Driver
    username: trading_user
    password: trading_password
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 30000
      max-lifetime: 1800000
  
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        generate_statistics: false
        default_schema: trading_platform
        jdbc:
          lob:
            non_contextual_creation: true

  # Liquibase Configuration
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    default-schema: trading_platform
    enabled: true
    drop-first: false

# Camunda BPM Configuration
camunda:
  bpm:
    # Camunda Database Configuration (Workflow Engine Data)
    database:
      schema-update: true
      type: postgres
    datasource:
      url: jdbc:postgresql://localhost:5432/camunda
      driver-class-name: org.postgresql.Driver
      username: trading_user
      password: trading_password
      hikari:
        maximum-pool-size: 10
        minimum-idle: 3
        idle-timeout: 300000
        connection-timeout: 30000
        max-lifetime: 1800000
    admin-user:
      id: demo
      password: demo
    filter:
      create: All tasks
    webapp:
      index-redirect-enabled: true
    # External Task Client Configuration - Production Ready
    client:
      base-url: ${CAMUNDA_BASE_URL:http://localhost:8080/engine-rest}
      worker-id: ${CAMUNDA_WORKER_ID:trading-platform-worker}
      max-tasks: ${CAMUNDA_MAX_TASKS:10}
      use-priority: true
      async-response-timeout: ${CAMUNDA_ASYNC_TIMEOUT:10000}  # 10 seconds for long polling
      lock-duration: ${CAMUNDA_LOCK_DURATION:120000}  # 2 minutes - should be longer than expected task execution time
      default-serialization-format: application/json
      # Backoff strategy for when no tasks are available
      disable-backoff-strategy: false
      backoff-strategy-time: ${CAMUNDA_BACKOFF_TIME:5000}  # 5 seconds between fetch attempts (reduced polling frequency)
      # Basic authentication for production
      basic-auth:
        username: ${CAMUNDA_BASIC_AUTH_USERNAME:demo}
        password: ${CAMUNDA_BASIC_AUTH_PASSWORD:demo}
      # Topic subscriptions with specific configurations
      subscriptions:
        fetch-instruments-data:
          process-definition-keys: 
            - Process_Fetch_Instrument_Data
            - Process_Back_Test_MPT
          variable-names: instrumentCodes,startDate,endDate,launchNewInstruments,resource
          include-extension-properties: true
          lock-duration: ${CAMUNDA_FETCH_DATA_LOCK_DURATION:300000}  # 5 minutes for data fetching tasks
          auto-open: true

# Market Data Module Configuration
market-data:
  external:
    provider: bybit  # Primary data provider: bybit
    timeout: 30s
    max-retries: 3
    rate-limit:
      requests-per-minute: 120  # Bybit allows 120 req/min for public endpoints
    bybit:
      baseUrl: https://api.bybit.com

  storage:
    batch-size: 1000
    enable-compression: true

  validation:
    max-daily-change: 0.5 # 50% daily change threshold
    min-data-points: 30
    quality-threshold: 0.8

# Resilience4j Circuit Breaker Configuration
resilience4j:
  circuitbreaker:
    instances:
      bybitApi:
        # Failure threshold: Open circuit after 50% failures
        failure-rate-threshold: 50
        # Minimum calls before evaluating: Need at least 5 calls
        minimum-number-of-calls: 5
        # Sliding window: Evaluate last 10 calls
        sliding-window-size: 10
        sliding-window-type: COUNT_BASED
        # Wait duration in OPEN state before attempting HALF_OPEN
        wait-duration-in-open-state: 30s
        # Calls allowed in HALF_OPEN state to test if service recovered
        permitted-number-of-calls-in-half-open-state: 3
        # Automatically transition from OPEN to HALF_OPEN
        automatic-transition-from-open-to-half-open-enabled: true
        # Slow call threshold
        slow-call-duration-threshold: 10s
        slow-call-rate-threshold: 50
        # Record these exceptions as failures
        record-exceptions:
          - java.net.ConnectException
          - java.net.SocketTimeoutException
          - feign.RetryableException
          - org.springframework.web.client.ResourceAccessException
        # Ignore these exceptions (don't count as failures)
        ignore-exceptions:
          - java.lang.IllegalArgumentException

  ratelimiter:
    instances:
      bybitRateLimiter:
        limit-for-period: 120
        limit-refresh-period: 60s
        timeout-duration: 5s

# Logging Configuration (Default - Local Development)
# For different environments, use Spring profiles:
# - Development: application-dev.yaml (file + console logging)
# - Production: application-prod.yaml (console only, JSON format)
# Activate with: --spring.profiles.active=dev or --spring.profiles.active=prod
logging:
  level:
    com.ahd.trading_platform: INFO
    org.camunda.bpm.client: INFO
    # Reduce noise from Camunda client when no tasks available
    org.camunda.bpm.client.topic.impl.TopicSubscriptionManager: WARN
    org.springframework: WARN
    # Disable SQL logging
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF
    org.hibernate.orm.jdbc.bind: OFF
    # HTTP request/response logging
    # Set to DEBUG to see request/response headers
    # Set to INFO to see request/response body and timing (default)
    # Set to WARN to disable HTTP logging
    com.ahd.trading_platform.shared.infrastructure.web.filters.HttpLoggingFilter: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%logger{36}] - %msg%n"
  # Default: Console only (no file logging)
  # Use 'dev' profile for file logging during development

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,modulith
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true
  info:
    env:
      enabled: true

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,text/html,text/xml,text/plain,application/javascript,text/css

# Spring Modulith Configuration  
spring.modulith:
  events:
    enabled: true
    republish-outstanding-events-on-restart: true
  actuator:
    enabled: true

# SpringDoc/Swagger Configuration
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
    displayRequestDuration: true
    showExtensions: true
    showCommonExtensions: true
  group-configs:
    - group: market-data
      display-name: Market Data API
      paths-to-match: /api/v1/market-data/**
    - group: portfolio
      display-name: Portfolio Management API
      paths-to-match: /api/v1/portfolios/**
    - group: forecasting
      display-name: Forecasting API
      paths-to-match: /api/v1/forecasting/**
    - group: backtesting
      display-name: Backtesting API
      paths-to-match: /api/v1/backtesting/**